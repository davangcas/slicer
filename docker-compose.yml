services:
  api:
    build: .
    command: uvicorn app.main:app --host 0.0.0.0 --port 8050
    ports:
      - "8050:8050"
    volumes:
      - ./app:/app/app
      - ./.env:/app/.env
    env_file:
      - path: .env
  telegram_bot:
    build: .
    command: sh -c "python app/bot_runner.py || uvicorn app.main:app --host 0.0.0.0 --port 8050"
    env_file:
      - path: .env
    volumes:
      - ./app:/app/app
      - ./.env:/app/.env
    depends_on:
      api:
        condition: service_started
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
